<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K10 Admin - Customers</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Navigation (Copied and updated from admin.html) -->
    <nav class="bg-white shadow-sm mb-8">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800">K10 Manager Portal</h1>
            <div class="space-x-4">
                <a href="admin.html" class="text-gray-600 hover:text-blue-600 font-medium">Inventory</a>
                <a href="admin-event.html" class="text-gray-600 hover:text-blue-600 font-medium">Events</a>
                <a href="admin-customers.html" class="text-blue-600 font-bold border-b-2 border-blue-600 pb-1">Customers</a>
                <a href="admin-storage.html" class="text-gray-600 hover:text-blue-600 font-medium">Pack Storage</a>
                <button id="logout-btn" class="text-red-600 font-semibold ml-4">Logout</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 pb-12">
        <div class="bg-white rounded-lg shadow-sm overflow-hidden mb-8">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-700">Customer List</h2>
                <input type="text" id="search-input" placeholder="Search Customers..." class="p-2 border rounded shadow-sm w-64">
            </div>

            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="p-4">Name</th>
                        <th class="p-4">Contact Info</th>
                        <th class="p-4">Membership</th>
                        <th class="p-4">Joined At</th>
                        <th class="p-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="customers-table-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Details Modal -->
    <div id="details-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-4xl mx-4 p-6 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold" id="modal-customer-name">Customer Details</h3>
                <button onclick="closeDetailsModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Storage Summary -->
                <div class="bg-gray-50 p-4 rounded-lg">
                    <h4 class="text-lg font-bold mb-4 text-blue-700 border-b pb-2">📦 Storage Summary</h4>
                    <div id="storage-summary-list" class="space-y-2">
                        <!-- Loaded dynamically -->
                    </div>
                </div>

                <!-- Event History -->
                <div class="bg-gray-50 p-4 rounded-lg">
                    <h4 class="text-lg font-bold mb-4 text-green-700 border-b pb-2">📅 Event History</h4>
                    <ul id="event-history-list" class="space-y-3 text-sm">
                        <!-- Loaded dynamically -->
                    </ul>
                </div>
            </div>

            <div class="mt-8 text-right">
                <button onclick="closeDetailsModal()" class="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700">Close</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col space-y-2"></div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        // NOTE: In a real deploy, this should be https://k10-system.onrender.com/api
        // Since I cannot change the "real" files easily if they are served elsewhere,
        // I will revert this to the production URL before final submit if needed.
        // But for now, I will use the production URL pattern to be consistent with existing files
        // assuming the user will deploy these files.

        const BASE_API = 'https://k10-system.onrender.com/api';

        let globalCustomers = [];

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('k10_token');
            if (!token) {
                window.location.href = 'admin.html'; // Redirect to login if not logged in
                return;
            }

            loadCustomers();

            document.getElementById('logout-btn').addEventListener('click', () => {
                localStorage.removeItem('k10_token');
                window.location.href = 'admin.html';
            });

            document.getElementById('search-input').addEventListener('input', renderTable);
        });

        async function loadCustomers() {
            try {
                const res = await fetch(`${BASE_API}/customers`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('k10_token')}` }
                });
                if (!res.ok) throw new Error('Failed to load customers');
                globalCustomers = await res.json();
                renderTable();
            } catch (error) {
                console.error(error);
                showToast(error.message, 'error');
            }
        }

        function renderTable() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const filtered = globalCustomers.filter(c =>
                c.name.toLowerCase().includes(search) ||
                c.contact_info.toLowerCase().includes(search)
            );

            const tbody = document.getElementById('customers-table-body');
            tbody.innerHTML = filtered.map(c => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-4 font-medium">${c.name}</td>
                    <td class="p-4 text-gray-600">${c.contact_info}</td>
                    <td class="p-4">
                        <button onclick="toggleMembership(${c.id}, ${c.is_member})"
                            class="px-3 py-1 rounded-full text-xs font-bold ${c.is_member ? 'bg-green-100 text-green-800' : 'bg-gray-200 text-gray-600'}">
                            ${c.is_member ? 'MEMBER' : 'Standard'}
                        </button>
                    </td>
                    <td class="p-4 text-sm text-gray-500">${new Date(c.created_at).toLocaleDateString()}</td>
                    <td class="p-4 text-right">
                        <button onclick="viewDetails(${c.id}, '${c.name}')" class="text-blue-600 hover:underline font-medium">View Details</button>
                    </td>
                </tr>
            `).join('');
        }

        async function toggleMembership(id, currentStatus) {
            const newStatus = !currentStatus;
            try {
                const res = await fetch(`${BASE_API}/customers/${id}/membership`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('k10_token')}`
                    },
                    body: JSON.stringify({ is_member: newStatus })
                });

                if (res.ok) {
                    showToast(`Membership updated for ID ${id}`, 'success');
                    loadCustomers();
                } else {
                    showToast('Update failed', 'error');
                }
            } catch (err) {
                showToast('Connection error', 'error');
            }
        }

        async function viewDetails(id, name) {
            document.getElementById('modal-customer-name').innerText = name;
            const storageList = document.getElementById('storage-summary-list');
            const eventList = document.getElementById('event-history-list');

            storageList.innerHTML = '<p class="text-gray-500">Loading...</p>';
            eventList.innerHTML = '<p class="text-gray-500">Loading...</p>';

            document.getElementById('details-modal').classList.remove('hidden');

            try {
                const res = await fetch(`${BASE_API}/customers/${id}/details`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('k10_token')}` }
                });
                const data = await res.json();

                // Render Storage
                if (data.storage.length === 0) {
                    storageList.innerHTML = '<p class="text-gray-400 italic">No packs stored.</p>';
                } else {
                    storageList.innerHTML = data.storage.map(s => `
                        <div class="flex justify-between items-center bg-white p-3 rounded border">
                            <span class="font-semibold text-gray-700">${s.game_title}</span>
                            <span class="bg-blue-100 text-blue-800 py-1 px-3 rounded-full text-sm font-bold">${s.quantity} Packs</span>
                        </div>
                    `).join('');
                }

                // Render Events
                if (data.events.length === 0) {
                    eventList.innerHTML = '<p class="text-gray-400 italic">No event history.</p>';
                } else {
                    eventList.innerHTML = data.events.map(e => `
                        <li class="bg-white p-3 rounded border border-l-4 border-l-green-500">
                            <div class="font-bold text-gray-800">${e.title}</div>
                            <div class="text-xs text-gray-500 flex justify-between mt-1">
                                <span>${e.game_title}</span>
                                <span>${new Date(e.event_date).toLocaleDateString()}</span>
                            </div>
                        </li>
                    `).join('');
                }

            } catch (err) {
                console.error(err);
                storageList.innerHTML = '<p class="text-red-500">Error loading details.</p>';
            }
        }

        function closeDetailsModal() {
            document.getElementById('details-modal').classList.add('hidden');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = type === 'success' ? 'bg-green-600' : 'bg-red-600';
            toast.className = `${colors} text-white px-6 py-3 rounded-lg shadow-lg mb-2`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
