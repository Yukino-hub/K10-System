            <div class="space-y-4">

                    <button id="add-card-btn" class="bg-green-600 text-white p-2 rounded hover:bg-green-700 col-span-full md:col-span-1">Add Card</button>

            </div>

                            <th class="p-4">Stock</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
