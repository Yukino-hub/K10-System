<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K10 Shop - Customer Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .game-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <!-- Header -->
    <header class="bg-blue-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-6 flex justify-between items-center">
            <h1 class="text-3xl font-bold">K10 Card Shop</h1>
            <a href="index.html" class="text-sm bg-blue-700 hover:bg-blue-800 px-3 py-1 rounded">Staff Login</a>
        </div>
    </header>

    <!-- Main Content -->
    <main id="app" class="max-w-7xl mx-auto px-4 py-8">

        <!-- Loading State -->
        <div id="loading" class="text-center py-20">
            <p class="text-xl text-gray-600">Loading shop inventory...</p>
        </div>

        <!-- Game List View -->
        <div id="game-list-view" class="hidden">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800">Browse by Game</h2>
            <div id="game-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Game cards will be injected here -->
            </div>
        </div>

        <!-- Product List View -->
        <div id="product-list-view" class="hidden">
            <div class="flex items-center mb-6">
                <button id="back-btn" class="flex items-center text-blue-600 hover:text-blue-800 font-semibold mr-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                    </svg>
                    Back to Games
                </button>
                <h2 id="selected-game-title" class="text-2xl font-bold text-gray-800"></h2>
            </div>

            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Product cards will be injected here -->
            </div>
        </div>

    </main>

    <footer class="bg-gray-800 text-white mt-auto py-6">
        <div class="max-w-7xl mx-auto px-4 text-center text-gray-400 text-sm">
            &copy; 2024 K10 Card Shop. All rights reserved.
        </div>
    </footer>

    <script>
        const API_URL = 'http://localhost:5000/api'; // Adjust if deployed

        // State
        let allProducts = [];
        let games = {};

        // DOM Elements
        const loadingEl = document.getElementById('loading');
        const gameListView = document.getElementById('game-list-view');
        const productListView = document.getElementById('product-list-view');
        const gameGrid = document.getElementById('game-grid');
        const productGrid = document.getElementById('product-grid');
        const selectedGameTitle = document.getElementById('selected-game-title');
        const backBtn = document.getElementById('back-btn');

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            fetchInventory();
            backBtn.addEventListener('click', showGameList);
        });

        async function fetchInventory() {
            try {
                const res = await fetch(`${API_URL}/inventory`);
                if (!res.ok) throw new Error('Failed to fetch');
                allProducts = await res.json();
                processData(allProducts);
                renderGameList();
                showGameList();
            } catch (err) {
                console.error(err);
                loadingEl.innerHTML = `<p class="text-red-500">Error loading inventory. Please try again later.</p>`;
            }
        }

        function processData(products) {
            games = {};
            products.forEach(p => {
                const title = p.game_title || 'Other';
                if (!games[title]) {
                    games[title] = [];
                }
                games[title].push(p);
            });
        }

        function showGameList() {
            loadingEl.classList.add('hidden');
            productListView.classList.add('hidden');
            gameListView.classList.remove('hidden');
        }

        function showProductList(gameTitle) {
            gameListView.classList.add('hidden');
            productListView.classList.remove('hidden');
            selectedGameTitle.innerText = gameTitle;
            renderProductList(gameTitle);
        }

        function renderGameList() {
            gameGrid.innerHTML = Object.keys(games).map(title => `
                <div class="game-card bg-white p-6 rounded-lg shadow-sm border border-gray-100 cursor-pointer flex flex-col items-center justify-center h-40"
                     onclick="showProductList('${title}')">
                    <h3 class="text-xl font-bold text-gray-800 text-center">${title}</h3>
                    <p class="text-gray-500 mt-2">${games[title].length} Items</p>
                </div>
            `).join('');

            // Expose function to window for onclick
            window.showProductList = showProductList;
        }

        function renderProductList(gameTitle) {
            const products = games[gameTitle] || [];
            productGrid.innerHTML = products.map(p => `
                <div class="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                    <div class="p-4 flex-grow">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-xs font-bold text-blue-600 uppercase bg-blue-50 px-2 py-1 rounded">
                                ${p.product_type}
                            </span>
                            ${p.rarity ? `<span class="text-xs font-semibold text-purple-600 border border-purple-200 px-2 py-1 rounded">${p.rarity}</span>` : ''}
                        </div>

                        <h3 class="font-bold text-gray-800 text-lg mb-1">${p.card_name}</h3>
                        ${p.set_name ? `<p class="text-sm text-gray-500 mb-2">${p.set_name}</p>` : ''}

                        ${p.card_id ? `<p class="text-xs font-mono text-gray-400 mb-4">ID: ${p.card_id}</p>` : ''}
                    </div>

                    <div class="p-4 bg-gray-50 border-t border-gray-100 flex justify-between items-center">
                        <span class="text-xl font-bold text-green-700">$${p.price}</span>
                        <span class="text-sm font-semibold ${p.stock_quantity > 0 ? 'text-gray-700' : 'text-red-500'}">
                            ${p.stock_quantity > 0 ? `${p.stock_quantity} in stock` : 'Out of Stock'}
                        </span>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
